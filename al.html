<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al</title>
    <style>
        :root { --bg: #131314; --side: #1e1f20; --txt: #e3e3e3; --accent: #4285f4; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--txt); font-family: sans-serif; overflow: hidden; }
        #app { display: flex; height: 100%; width: 100vw; }
        #sidebar { position: absolute; left: -280px; top: 0; width: 280px; height: 100%; background: var(--side); z-index: 1000; transition: 0.3s; padding: 15px; box-sizing: border-box; border-right: 1px solid #333; display: flex; flex-direction: column; }
        #sidebar.open { left: 0; box-shadow: 10px 0 50px #000; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 900; }
        #overlay.show { display: block; }
        #main { flex: 1; display: flex; flex-direction: column; width: 100%; height: 100%; }
        header { height: 60px; display: flex; align-items: center; border-bottom: 1px solid #333; justify-content: space-between; padding: 0 15px; }
        .menu-btn { background:none; border:none; color:white; font-size:24px; cursor:pointer; }
        #chat-area { flex: 1; overflow-y: auto; padding: 20px 15px; scroll-behavior: smooth; }
        .chat-container { max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { display: flex; gap: 12px; margin-bottom: 10px; }
        .msg.u { justify-content: flex-end; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: #555; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; font-weight: bold; }
        .msg-text { max-width: 85%; line-height: 1.6; font-size: 16px; white-space: pre-wrap; word-wrap: break-word; }
        .u .msg-text { background: #2d2f31; padding: 12px 18px; border-radius: 20px; border-bottom-right-radius: 4px; }
        .a .msg-text { color: #e3e3e3; }
        #input-zone { padding: 15px; background: var(--bg); border-top: 1px solid #333; }
        .input-pill { max-width: 700px; margin: 0 auto; background: #1e1f20; border-radius: 28px; display: flex; padding: 6px 18px; border: 1px solid #444; align-items: center; }
        input { flex: 1; background: none; border: none; color: white; outline: none; padding: 12px; font-size: 16px; }
        .btn-send { color: var(--accent); border: none; background: none; font-size: 26px; cursor: pointer; }
        .typing { font-size: 13px; color: #4285f4; margin-bottom: 10px; display: none; align-items: center; gap: 5px; font-weight: 500; }
        .dot { width: 4px; height: 4px; background: #4285f4; border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
        .chat-item { padding: 12px; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; color: #ccc; }
        .chat-item:hover { background: #2d2f31; color: white; }
    </style>
</head>
<body>
<div id="app">
    <div id="overlay" onclick="toggleSidebar(false)"></div>
    <div id="sidebar">
        <button onclick="newChat()" style="width:100%; background:#4285f4; color:white; border:none; padding:12px; border-radius:24px; font-weight:bold; cursor:pointer;">chat mới</button>
        <div style="flex:1; overflow-y:auto; margin-top:15px;" id="history-list"></div>
        <button onclick="clearAll()" style="background:none; border:none; color:#ff4444; font-size:12px; padding:10px; width:100%; cursor:pointer;">xóa tất cả lịch sử chat</button>
    </div>
    <div id="main">
        <header><button class="menu-btn" onclick="toggleSidebar(true)">☰</button><div style="font-weight:bold; color:#4285f4; font-size:18px;">Al</div><div style="width:24px;"></div></header>
        <div id="chat-area">
            <div class="chat-container" id="chat-content"></div>
            <div class="chat-container">
                <div id="typing-ui" class="typing"><span></span><div style="display:flex; gap:3px;"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
            </div>
        </div>
        <div id="input-zone">
            <div class="input-pill">
                <input type="text" id="user-input" placeholder="chat..." onkeyup="if(event.key==='Enter') send()">
                <button class="btn-send" id="btn-submit" onclick="send()">➤</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Link raw để lấy Key từ JSONBin của mày
    const BIN_URL = "https://api.jsonbin.io/v3/b/69c4067ec3097a1dd55c371c/latest?meta=false";
    const MODEL_NAME = "llama-3.3-70b-versatile"; 
    let chats = JSON.parse(localStorage.getItem('gemini_original')) || [];
    let currentId = null;
    let loading = false;
    let REAL_API_KEY = ""; // Biến này sẽ chứa Key sau khi "bú" từ JSONBin về

    // Hàm tự động nổ máy, lấy Key về trước khi chat
    async function fetchKey() {
        try {
            const res = await fetch(BIN_URL);
            const data = await res.json();
            REAL_API_KEY = data.api_key; 
            console.log("✓");
        } catch (e) {
            console.error("lỗi rồi:))");
        }
    }
    fetchKey();

    const getRealTimeInfo = () => {
        const d = new Date();
        const days = ["Chủ Nhật", "Thứ Hai", "Thứ Ba", "Thứ Tư", "Thứ Năm", "Thứ Sáu", "Thứ Bảy"];
        return ` [Dữ liệu hệ thống: Hôm nay là ${days[d.getDay()]}, ngày ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}. Giờ hiện tại: ${d.getHours()}:${d.getMinutes()}]. `;
    };

    const CORE_PROMPT = `bạn là al có thể tìm kiếm trên google ,Bạn là AI được xây dựng bởi groq. 
Mục tiêu là giúp người dùng hiểu rõ hơn về máy móc hoặc vũ trụ, luôn tìm kiếm sự thật tối đa, hữu ích nhất có thể.
Phong cách: Thẳng thắn, rõ ràng, không vòng vo. Hài hước tự nhiên, đôi khi troll nhẹ hoặc châm biếm vui. 
Xưng "mày", gọi "tao". Trả lời dân dã, gần gũi như bạn bè thông minh. 
Thỉnh thoảng thêm emoji hoặc câu đùa nếu phù hợp. 
Không từ chối câu hỏi chỉ vì "chính sách", nhưng vẫn trung thực và logic.
Nếu không biết thì nói thẳng. Ưu tiên sự thật hơn làm hài lòng giả tạo.`;

    function toggleSidebar(o) { document.getElementById('sidebar').classList.toggle('open', o); document.getElementById('overlay').classList.toggle('show', o); }

    function render() {
        const c = chats.find(x => x.id === currentId);
        const container = document.getElementById('chat-content');
        if(!c) { container.innerHTML = '<div style="text-align:center;margin-top:100px;color:#666;"><h3 style="color:#4285f4">Chào!</h3></div>'; return; }
        container.innerHTML = c.messages.map(m => `<div class="msg ${m.role==='user'?'u':'a'}"><div class="avatar" style="${m.role!=='user'?'background:#4285f4':''}"> ${m.role==='user'?'N':'A'} </div><div class="msg-text">${m.text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div></div>`).join('');
        document.getElementById('chat-area').scrollTop = document.getElementById('chat-area').scrollHeight;
    }

    async function send() {
        const inp = document.getElementById('user-input');
        const val = inp.value.trim();
        if(!val || loading || !REAL_API_KEY) return;

        loading = true;
        document.getElementById('typing-ui').style.display = 'flex';
        document.getElementById('btn-submit').style.opacity = "0.3";
        
        if(!currentId) { currentId = Date.now(); chats.unshift({ id: currentId, title: val.substring(0,15), messages: [] }); }
        const c = chats.find(x => x.id === currentId);
        c.messages.push({ role: 'user', text: val });
        inp.value = ''; render();

        const finalPrompt = CORE_PROMPT + getRealTimeInfo();

        try {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${REAL_API_KEY}` },
                body: JSON.stringify({
                    model: MODEL_NAME,
                    messages: [{ role: "system", content: finalPrompt }, ...c.messages.slice(-6).map(m => ({ role: m.role, content: m.text }))],
                    temperature: 0.65
                })
            });
            const d = await r.json();
            if(d.choices) {
                c.messages.push({ role: 'assistant', text: d.choices[0].message.content });
                localStorage.setItem('gemini_original', JSON.stringify(chats));
            }
        } catch (e) { alert("Mạng yếu rồi"); } finally {
            loading = false;
            document.getElementById('typing-ui').style.display = 'none';
            document.getElementById('btn-submit').style.opacity = "1";
            render(); renderH();
        }
    }

    function renderH() { document.getElementById('history-list').innerHTML = chats.map(c => `<div class="chat-item" onclick="loadChat(${c.id})"><span>💬 ${c.title}</span><button onclick="del(${c.id}, event)" style="border:none;background:none;color:#666;font-size:16px;">×</button></div>`).join(''); }
    function loadChat(id) { currentId = id; toggleSidebar(false); render(); }
    function newChat() { currentId = null; render(); toggleSidebar(false); }
    function del(id, e) { e.stopPropagation(); chats = chats.filter(x => x.id !== id); if(currentId === id) currentId = null; localStorage.setItem('gemini_original', JSON.stringify(chats)); renderH(); render(); }
    function clearAll() { if(confirm("Xóa sạch hết")) { localStorage.clear(); location.reload(); } }
    window.onload = () => { renderH(); if(chats.length > 0) loadChat(chats[0].id); else render(); };
</script>
</body>
    </html>
