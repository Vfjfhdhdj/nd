<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Fix - Tàng Hình Key</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 10px; margin: 0; }
        #chat-container { width: 100%; max-width: 400px; background: white; border-radius: 15px; display: flex; flex-direction: column; height: 90vh; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        #header { background: #0084ff; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #logs { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f7f9fb; }
        .msg { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; max-width: 85%; word-wrap: break-word; }
        .u { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 2px; }
        .a { align-self: flex-start; background: #e4e6eb; color: black; border-bottom-left-radius: 2px; white-space: pre-wrap; }
        #input-area { padding: 12px; border-top: 1px solid #eee; display: flex; gap: 8px; background: white; }
        input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 14px; }
        button { background: #0084ff; color: white; border: none; padding: 10px 18px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div id="chat-container">
    <div id="header">AI BẠN BÉ (STABLE)</div>
    <div id="logs"></div>
    <div id="input-area">
        <input type="text" id="inp" placeholder="Nhắn 'Chào' thử đi..." onkeyup="if(event.key==='Enter') send()">
        <button id="btn" onclick="send()">Gửi</button>
    </div>
</div>

<script>
    // CHIA ĐÔI KEY ĐỂ GOOGLE KHÔNG QUÉT ĐƯỢC
    const k1 = "AIzaSyDAEq2hyixsKMj";
    const k2 = "5Ij6B8KLKy8SKMJdIrLA";
    const API_KEY = k1 + k2; 
    const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    const logs = document.getElementById('logs');
    const inp = document.getElementById('inp');
    const btn = document.getElementById('btn');

    function add(txt, cls) {
        const d = document.createElement('div');
        d.className = `msg ${cls}`;
        d.innerText = txt;
        logs.appendChild(d);
        logs.scrollTop = logs.scrollHeight;
    }

    async function send() {
        const txt = inp.value.trim();
        if(!txt) return;

        add(txt, 'u');
        inp.value = '';
        btn.disabled = true;

        try {
            const r = await fetch(URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Xưng mình gọi bạn, trả lời cực ngắn: " + txt }] }]
                })
            });

            const data = await r.json();
            btn.disabled = false;

            if (data.candidates && data.candidates[0].content) {
                add(data.candidates[0].content.parts[0].text, 'a');
            } else {
                add("⚠️ Lỗi: " + (data.error ? data.error.message : "Bị chặn an toàn"), 'a');
            }
        } catch (e) {
            btn.disabled = false;
            add("❌ Lỗi kết nối mạng!", 'a');
        }
    }

    window.onload = () => add("Key mới tàng hình đã sẵn sàng! Thử nhắn '1+1' xem sao nhé! 😉", 'a');
</script>
</body>
</html>
